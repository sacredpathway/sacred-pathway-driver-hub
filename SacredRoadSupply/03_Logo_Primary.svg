<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" role="img" aria-label="Sacred Road Supply">
  <defs>
    <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D87C"/>
    <stop offset="45%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
    <linearGradient id="goldFlat" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0A2F1F"/>
    <stop offset="100%" stop-color="#051B12"/>
  </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7CC355"/>
    <stop offset="65%" stop-color="#4A9D3F"/>
    <stop offset="100%" stop-color="#1A4D26"/>
  </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.45" r="0.6">
    <stop offset="0%" stop-color="#1F7A3A" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#1F7A3A" stop-opacity="0"/>
  </radialGradient>
    <filter id="metallic" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
    <feSpecularLighting result="spec" specularExponent="20" lighting-color="#F0D87C">
      <feDistantLight azimuth="135" elevation="45"/>
    </feSpecularLighting>
    <feComposite in="spec" in2="SourceGraphic" operator="in" result="specMask"/>
    <feMerge>
      <feMergeNode in="SourceGraphic"/>
      <feMergeNode in="specMask"/>
    </feMerge>
  </filter>
  </defs>

  <!-- Shield -->
  <g transform="translate(40,40)">
    <path d="M120 0 C60 0 10 20 10 60 L10 140 C10 200 70 230 120 240 C170 230 230 200 230 140 L230 60 C230 20 180 0 120 0 Z"
          fill="url(#emerald)"/>
    <ellipse cx="120" cy="120" rx="105" ry="115" fill="url(#halo)"/>
    <path d="M120 0 C60 0 10 20 10 60 L10 140 C10 200 70 230 120 240 C170 230 230 200 230 140 L230 60 C230 20 180 0 120 0 Z"
          fill="none" stroke="url(#goldShine)" stroke-width="3.5" filter="url(#metallic)"/>

    <!-- Road -->
    <path d="M40 215 L100 130 L140 130 L200 215 Z" fill="#121212"/>
    <g fill="url(#goldFlat)">
      <rect x="118" y="155" width="4" height="14"/>
      <rect x="118" y="178" width="4" height="14"/>
      <rect x="118" y="201" width="4" height="14"/>
    </g>

    <!-- TREE: organic canopy + substantial trunk + root system -->
    <g transform="translate(120,80)">
      <!-- Trunk (substantial, tapered) -->
      <path d="M-5,-10 Q-3,5 -4,30 L-4,55 Q-6,60 -3,65 L3,65 Q6,60 4,55 L4,30 Q3,5 5,-10 Z" fill="url(#goldShine)" filter="url(#metallic)"/>
      <!-- Roots -->
      <path d="M-2.1,65 L-1.4,79.0 Q0.0,81.8 1.4,79.0 L2.1,65 Z" fill="url(#goldShine)"/>
  <path d="M-3.1,65.0 Q-11.0,70.6 -15.4,76.2 Q-10.0,70.6 0.4,65.0 Z" fill="url(#goldShine)"/>
  <path d="M-0.4,65.0 Q10.0,70.6 15.4,76.2 Q11.0,70.6 3.1,65.0 Z" fill="url(#goldShine)"/>
  <path d="M-3.1,65.0 Q-15.7,67.1 -22.4,70.6 Q-15.1,67.1 -1.0,65.0 Z" fill="url(#goldFlat)" opacity="0.85"/>
  <path d="M1.0,65.0 Q15.1,67.1 22.4,70.6 Q15.7,67.1 3.1,65.0 Z" fill="url(#goldFlat)" opacity="0.85"/>
      <!-- Canopy (organic leaves) -->
      <ellipse cx="0" cy="-10.5" rx="47.5" ry="52.2" fill="#1A4D26"/>
  <ellipse cx="0" cy="-15.25" rx="42.8" ry="47.5" fill="url(#leaf)"/>
  <path d="M-36.1,-2.0 Q-35.5,-3.7 -36.1,-19.0 Q-36.7,-17.3 -36.1,-2.0 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M36.1,-2.0 Q36.7,-17.3 36.1,-19.0 Q35.5,-3.7 36.1,-2.0 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M-28.5,12.3 Q-26.2,10.2 -28.5,-4.8 Q-30.8,-2.7 -28.5,12.3 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M28.5,12.3 Q30.8,-2.7 28.5,-4.8 Q26.2,10.2 28.5,12.3 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M-13.3,16.1 Q-8.0,11.5 -13.3,0.9 Q-18.6,5.5 -13.3,16.1 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M13.3,16.1 Q18.6,5.5 13.3,0.9 Q8.0,11.5 13.3,16.1 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M0.0,21.3 Q6.5,13.2 0.0,5.2 Q-6.5,13.2 0.0,21.3 Z" fill="#4A9D3F" opacity="0.9"/>
  <path d="M0.0,-47.5 Q-8.4,-58.0 0.0,-68.5 Q8.4,-58.0 0.0,-47.5 Z" fill="#7CC355"/>
  <path d="M-14.2,-46.6 Q-21.1,-52.9 -14.2,-65.6 Q-7.4,-59.3 -14.2,-46.6 Z" fill="#7CC355"/>
  <path d="M14.2,-46.6 Q7.4,-59.3 14.2,-65.6 Q21.1,-52.9 14.2,-46.6 Z" fill="#7CC355"/>
  <path d="M-26.6,-38.0 Q-31.4,-41.8 -26.6,-55.1 Q-21.8,-51.4 -26.6,-38.0 Z" fill="#7CC355"/>
  <path d="M26.6,-38.0 Q21.8,-51.4 26.6,-55.1 Q31.4,-41.8 26.6,-38.0 Z" fill="#7CC355"/>
  <path d="M-39.9,-20.0 Q-41.9,-22.2 -39.9,-39.0 Q-37.9,-36.8 -39.9,-20.0 Z" fill="#7CC355"/>
  <path d="M39.9,-20.0 Q37.9,-36.8 39.9,-39.0 Q41.9,-22.2 39.9,-20.0 Z" fill="#7CC355"/>
  <path d="M-20.9,-31.4 Q-26.2,-36.0 -20.9,-46.6 Q-15.6,-42.0 -20.9,-31.4 Z" fill="#7CC355"/>
  <path d="M20.9,-31.4 Q15.6,-42.0 20.9,-46.6 Q26.2,-36.0 20.9,-31.4 Z" fill="#7CC355"/>
  <path d="M0.0,-47.5 Q-8.4,-58.0 0.0,-68.5 Q8.4,-58.0 0.0,-47.5 Z" fill="none" stroke="#F5F0E1" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- Ground line -->
    <rect x="30" y="213" width="180" height="3" fill="url(#goldShine)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(300,90)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="url(#goldShine)" letter-spacing="2" filter="url(#metallic)">SACRED ROAD</text>
    <text x="0" y="64" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="url(#leaf)" letter-spacing="2">SUPPLY</text>
    <rect x="0" y="80" width="500" height="3" fill="url(#goldShine)"/>
    <!-- Ornamental dashes flanking tagline (matches Sacred Pathway "— LLC —" style) -->
    <g>
      <line x1="0" y1="115" x2="22" y2="115" stroke="url(#goldFlat)" stroke-width="2"/>
      <text x="36" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#F5F0E1" letter-spacing="6">BUILT FOR THE LONG HAUL</text>
      <line x1="478" y1="115" x2="500" y2="115" stroke="url(#goldFlat)" stroke-width="2"/>
    </g>
  </g>
</svg>
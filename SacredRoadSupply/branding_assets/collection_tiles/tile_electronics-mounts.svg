<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="ELECTRONICS">
<defs>
  <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0A2F1F"/>
    <stop offset="100%" stop-color="#051B12"/>
  </linearGradient>
  <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D87C"/>
    <stop offset="45%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
  <linearGradient id="goldFlat" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
  <radialGradient id="tileGlow" cx="0.5" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#1F7A3A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1F7A3A" stop-opacity="0"/>
    </radialGradient>
</defs>
<rect width="1080" height="1080" fill="url(#emerald)"/>
<rect width="1080" height="1080" fill="url(#tileGlow)"/>
<!-- Category silhouette (R6 — 10% opacity hint) -->
<g transform="translate(540 560) scale(2.0)" fill="#7CC355" opacity="0.10"><rect x="-90" y="-180" width="180" height="340" rx="20"/><rect x="-60" y="-150" width="120" height="240" rx="8"/></g>
<!-- Inner emerald frame -->
<rect x="20" y="20" width="1040" height="1040" fill="none" stroke="#CCAD42" stroke-width="1" opacity="0.22"/>
<!-- Gold corner stripe -->
<path d="M0 0 L140 0 L0 140 Z" fill="url(#goldShine)" opacity="0.95"/>

<!-- Foreground icon -->
<g transform="translate(540 420)">

<g stroke="#CCAD42" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <rect x="-110" y="-200" width="220" height="380" rx="22"/>
  <rect x="-80" y="-160" width="160" height="280" rx="6" fill="#CCAD42" fill-opacity="0.18"/>
  <circle cx="0" cy="155" r="14"/>
</g>
<path d="M40 -90 L -20 30 L 20 30 L -10 130 L 50 0 L 10 0 Z" fill="#F0D87C" stroke="#CCAD42" stroke-width="6" stroke-linejoin="round"/>
</g>

<!-- Label band -->
<rect x="0" y="870" width="1080" height="140" fill="url(#goldFlat)"/>
<text x="540" y="958" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="64" fill="#0A2F1F" letter-spacing="6">ELECTRONICS</text>
<rect x="0" y="1010" width="1080" height="6" fill="#0A2F1F"/>

<!-- R2 FIX: watermark now spGoldLight at 35% opacity (was srsGoldHighlight 65%) -->
<text x="540" y="850" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="24" fill="#E6CC73" opacity="0.35" letter-spacing="6">SACRED ROAD SUPPLY</text>
</svg>
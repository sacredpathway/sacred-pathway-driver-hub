<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" role="img" aria-label="FAMILY-OWNED">
<defs>
  <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D87C"/>
    <stop offset="45%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
  <linearGradient id="goldFlat" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
  <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feFlood flood-color="#CCAD42" flood-opacity="0.18"/>
    <feComposite in2="offsetblur" operator="in"/>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<!-- Ring with drop shadow -->
<g filter="url(#goldShadow)">
  <circle cx="180" cy="160" r="130" fill="none" stroke="url(#goldShine)" stroke-width="5"/>
  <circle cx="180" cy="160" r="123" fill="none" stroke="#CCAD42" stroke-width="1" opacity="0.5"/>
</g>

<g transform="translate(180 160)" stroke="url(#goldShine)" stroke-linecap="round" stroke-linejoin="round">

<line x1="-50" y1="-70" x2="-50" y2="80" stroke-width="8" stroke="#CCAD42" stroke-linecap="round"/>
<path d="M-50 -70 L 65 -55 Q 45 -30 65 -5 L -50 -20 Z" fill="#CCAD42" fill-opacity="0.28" stroke-width="8"/>
<path d="M0 -55 L 7 -39 L 24 -38 L 11 -28 L 15 -12 L 0 -22 L -15 -12 L -11 -28 L -24 -38 L -7 -39 Z" fill="#CCAD42" stroke="none"/>
<line x1="-65" y1="80" x2="-35" y2="80" stroke-width="6" stroke="#CCAD42" stroke-linecap="round"/>

</g>
<!-- R10: caption bumped from 22 → 28 -->
<text x="180" y="360" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28" fill="#0A2F1F" letter-spacing="1.5">FAMILY-OWNED</text>
<text x="180" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="17" fill="#6B6B6B" letter-spacing="0.5">Greensboro, Alabama</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" role="img" aria-label="FREE U.S. SHIPPING">
<defs>
  <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D87C"/>
    <stop offset="45%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
  <linearGradient id="goldFlat" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E6CC73"/>
    <stop offset="100%" stop-color="#CCAD42"/>
  </linearGradient>
  <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feFlood flood-color="#CCAD42" flood-opacity="0.18"/>
    <feComposite in2="offsetblur" operator="in"/>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<!-- Ring with drop shadow -->
<g filter="url(#goldShadow)">
  <circle cx="180" cy="160" r="130" fill="none" stroke="url(#goldShine)" stroke-width="5"/>
  <circle cx="180" cy="160" r="123" fill="none" stroke="#CCAD42" stroke-width="1" opacity="0.5"/>
</g>

<g transform="translate(180 160)" stroke="url(#goldShine)" stroke-linecap="round" stroke-linejoin="round">

<rect x="-100" y="-30" width="120" height="70" rx="6" fill="none" stroke-width="8"/>
<rect x="20" y="-10" width="60" height="50" rx="4" fill="none" stroke-width="8"/>
<path d="M30 -5 L 70 -5 L 75 25 L 25 25 Z" fill="#CCAD42" fill-opacity="0.3" stroke-width="8"/>
<circle cx="-70" cy="50" r="18" fill="none" stroke-width="8"/>
<circle cx="-70" cy="50" r="6" fill="#CCAD42" stroke="none"/>
<circle cx="50" cy="50" r="18" fill="none" stroke-width="8"/>
<circle cx="50" cy="50" r="6" fill="#CCAD42" stroke="none"/>
<line x1="-130" y1="0" x2="-110" y2="0" fill="none" stroke-width="8"/>
<line x1="-130" y1="20" x2="-115" y2="20" fill="none" stroke-width="8"/>

</g>
<!-- R10: caption bumped from 22 → 28 -->
<text x="180" y="360" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28" fill="#0A2F1F" letter-spacing="1.5">FREE U.S. SHIPPING</text>
<text x="180" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="17" fill="#6B6B6B" letter-spacing="0.5">Orders $75+</text>
</svg>